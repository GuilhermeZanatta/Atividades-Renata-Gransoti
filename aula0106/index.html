<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table border="1">
        <caption>Trajetória Acadêmica e Profissional</caption>
        <tr>
            <th rowspan="2">Estudante</th>
            <th colspan="2">Formação</th>
            <th rowspan="2">Ano de conclusão</th>
        </tr>
        <tr>
            <th>Graduação</th>
            <th>Pós Graduação</th>
        </tr>
        <tr>
            <th>José</th>
            <td>Ciência da Computação</td>
            <td>Inteligência Artificial</td>
            <td>2023</td>
        </tr>
        <tr>
            <th>Ana</th>
            <td>Engenharia de Software</td>
            <td>Gestão de Projetos</td>
            <td>2022</td>
        </tr>
    </table>
</body>
</html>

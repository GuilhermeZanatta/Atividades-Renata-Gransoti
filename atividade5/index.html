<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Cadastro</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
        font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
        color: #1f2937;
      }

      .cartao {
        width: 100%;
        max-width: 980px;
        background: #fffaf0;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
        padding: 28px;
      }

      fieldset {
        border: 2px solid #d4b24c;
        border-radius: 18px;
        padding: 18px;
        background: #fff;
      }

      legend {
        padding: 0 8px;
        font-size: 1.1rem;
        font-weight: 700;
        color: #8a6a0c;
      }

      .grade {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      .campo-longo {
        grid-column: 1 / -1;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #374151;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1.5px solid #cbd5e1;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 1rem;
        background: #fff;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }

      input[type="checkbox"],
      input[type="radio"] {
        width: auto;
        margin: 0;
      }

      input[type="checkbox"],
      input[type="radio"],
      select {
        accent-color: #facc15;
      }

      select {
        appearance: auto;
        background-color: #fffef7;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #facc15;
        box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.18);
        transform: translateY(-1px);
      }

      .grupo-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .opcao {
        display: flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 0;
      }

      .lista-interesses {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        text-align: left;
        width: 100%;
        margin: 0;
        padding: 0;
        gap: 4px;
      }

      .item-interesse {
        display: flex;
        align-items: center;
        gap: 8px;
        width: auto;
        margin: 0;
        padding: 0;
        text-align: left;
      }

      .item-interesse input {
        margin: 0;
      }

      .acoes {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 18px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .botao-enviar {
        background: #facc15;
        color: #111827;
      }

      .botao-enviar:hover {
        background: #eab308;
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(234, 179, 8, 0.35);
      }

      .botao-limpar {
        background: #e5e7eb;
        color: #111827;
      }

      .botao-limpar:hover {
        background: #d1d5db;
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(209, 213, 219, 0.45);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      @media (max-width: 860px) {
        .grade {
          grid-template-columns: 1fr;
        }

        .acoes {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <form class="cartao" action="#" method="post" autocomplete="on">
      <fieldset>
        <legend>Cadastro acadêmico</legend>

        <div class="grade">
          <div class="campo-longo">
            <label for="nome">Nome</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite seu nome completo"
              required
            />
          </div>

          <div>
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div>
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Crie uma senha"
              required
            />
          </div>

          <div>
            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" name="nascimento" required />
          </div>

          <div>
            <label for="curso">Curso</label>
            <select id="curso" name="curso" required>
              <option value="">Selecione</option>
              <option>Engenharia de Software</option>
              <option>Ciencias da Computação</option>
            </select>
          </div>

          <div>
            <label>Sexo</label>
            <div class="grupo-inline">
              <label class="opcao"
                ><input type="radio" name="sexo" value="masculino" />
                Masculino</label
              >
              <label class="opcao"
                ><input type="radio" name="sexo" value="feminino" />
                Feminino</label
              >
              <label class="opcao"
                ><input type="radio" name="sexo" value="outro" /> Outro</label
              >
            </div>
          </div>

          <div class="campo-longo">
            <label>Interesses</label>
            <div class="lista-interesses">
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="algoritmos" />
                Algoritmos</label
              >
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="banco" /> Banco
                de Dados</label
              >
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="redes" /> Redes
                de Computadores</label
              >
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="requisitos" />
                Engenharia de Requisitos</label
              >
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="ia" />
                Inteligência Artificial</label
              >
              <label class="item-interesse"
                ><input type="checkbox" name="interesses" value="testes" />
                Testes de Software</label
              >
            </div>
          </div>

          <div class="campo-longo">
            <label for="comentarios">Comentários</label>
            <textarea
              id="comentarios"
              name="comentarios"
              placeholder="Escreva aqui qualquer observação ou motivação"
            ></textarea>
          </div>

          <div class="campo-longo">
            <label for="foto">Upload de foto</label>
            <input type="file" id="foto" name="foto" accept="image/*" />
          </div>
        </div>

        <div class="acoes">
          <button class="botao-limpar" type="reset">Limpar</button>
          <button class="botao-enviar" type="submit">Enviar</button>
        </div>
      </fieldset>
    </form>
  </body>
</html>
